<svg width="680" height="480" viewBox="0 0 680 480" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Road Network View — ArcGIS Pro</title>
  <desc>Vista de la red vial con caminos principales, secundarios, bifurcaciones, mojones y análisis topológico</desc>
  <rect width="680" height="480" fill="#1a2332" rx="8"/>
  <rect x="0" y="0" width="680" height="28" fill="#0d1520" rx="8"/>
  <rect x="0" y="18" width="680" height="10" fill="#0d1520"/>
  <text x="12" y="18" font-family="monospace" font-size="11" fill="#8a9bb0">ArcGIS Pro — Road Network Analysis</text>
  <g stroke="#243047" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="80" x2="680" y2="80"/><line x1="0" y1="160" x2="680" y2="160"/>
    <line x1="0" y1="240" x2="680" y2="240"/><line x1="0" y1="320" x2="680" y2="320"/>
    <line x1="0" y1="400" x2="680" y2="400"/>
    <line x1="100" y1="28" x2="100" y2="480"/><line x1="200" y1="28" x2="200" y2="480"/>
    <line x1="300" y1="28" x2="300" y2="480"/><line x1="400" y1="28" x2="400" y2="480"/>
    <line x1="500" y1="28" x2="500" y2="480"/><line x1="600" y1="28" x2="600" y2="480"/>
  </g>
  <!-- Main roads (yellow/orange) -->
  <g stroke="#e67e22" stroke-width="3" fill="none" stroke-linecap="round">
    <polyline points="70,80 180,100 300,90 420,110 540,95 640,90"/>
    <polyline points="300,90 300,200 300,320 300,420"/>
    <polyline points="420,110 420,220 420,340"/>
  </g>
  <!-- Secondary roads (light gray) -->
  <g stroke="#8ab0d0" stroke-width="1.5" fill="none" stroke-linecap="round">
    <polyline points="180,100 180,200 160,300 140,380"/>
    <polyline points="300,200 200,240 140,260 90,290"/>
    <polyline points="300,200 380,240 450,260 520,280 580,300"/>
    <polyline points="420,220 360,260 300,320"/>
    <polyline points="420,220 480,260 540,290 600,310"/>
    <polyline points="300,320 220,360 160,400"/>
    <polyline points="300,320 370,370 420,340"/>
    <polyline points="420,340 500,370 570,390 630,400"/>
  </g>
  <!-- Tertiary (thin dashed) -->
  <g stroke="#4a6a8a" stroke-width="1" fill="none" stroke-dasharray="5,4">
    <polyline points="140,380 110,420 90,450"/>
    <polyline points="160,400 140,430 120,460"/>
    <polyline points="630,400 640,430 645,460"/>
    <polyline points="570,390 560,420 550,455"/>
  </g>
  <!-- Bifurcations (blue diamonds) -->
  <g fill="#5dade2" stroke="#fff" stroke-width="1">
    <polygon points="300,90 308,100 300,110 292,100"/>
    <polygon points="180,100 188,110 180,120 172,110"/>
    <polygon points="420,110 428,120 420,130 412,120"/>
    <polygon points="300,200 308,210 300,220 292,210"/>
    <polygon points="420,220 428,230 420,240 412,230"/>
    <polygon points="300,320 308,330 300,340 292,330"/>
    <polygon points="420,340 428,350 420,360 412,350"/>
  </g>
  <!-- Kilometer markers (white circles) -->
  <g fill="none" stroke="#c8d8e8" stroke-width="1">
    <circle cx="250" cy="92" r="5"/><text x="244" y="85" font-family="monospace" font-size="7" fill="#c8d8e8">km2</text>
    <circle cx="350" cy="93" r="5"/><text x="344" y="86" font-family="monospace" font-size="7" fill="#c8d8e8">km4</text>
    <circle cx="300" cy="150" r="5"/><text x="308" y="154" font-family="monospace" font-size="7" fill="#c8d8e8">km1</text>
    <circle cx="300" cy="265" r="5"/><text x="308" y="269" font-family="monospace" font-size="7" fill="#c8d8e8">km2</text>
  </g>
  <!-- Topology errors (red) -->
  <circle cx="580" cy="300" r="9" fill="none" stroke="#e74c3c" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="593" y="304" font-family="monospace" font-size="8" fill="#e74c3c">Dangle</text>
  <circle cx="200" cy="240" r="9" fill="none" stroke="#f39c12" stroke-width="2" stroke-dasharray="3,2"/>
  <text x="213" y="244" font-family="monospace" font-size="8" fill="#f39c12">Pseudo</text>
  <!-- Layer panel -->
  <rect x="0" y="28" width="55" height="452" fill="#0d1520" opacity="0.95"/>
  <text x="27" y="52" text-anchor="middle" font-family="monospace" font-size="7" fill="#8a9bb0">LAYERS</text>
  <rect x="7" y="60" width="40" height="7" fill="#e67e22" rx="1"/>
  <text x="9" y="67" font-family="monospace" font-size="6.5" fill="#111">Main</text>
  <rect x="7" y="73" width="40" height="7" fill="#8ab0d0" rx="1"/>
  <text x="9" y="80" font-family="monospace" font-size="6.5" fill="#111">Secondary</text>
  <rect x="7" y="86" width="40" height="7" fill="#4a6a8a" rx="1"/>
  <text x="9" y="93" font-family="monospace" font-size="6.5" fill="#c8d8e8">Tertiary</text>
  <polygon points="27,106 31,112 27,118 23,112" fill="#5dade2" stroke="#fff" stroke-width="0.5"/>
  <text x="9" y="128" font-family="monospace" font-size="6.5" fill="#5dade2">Bifurc.</text>
  <circle cx="27" cy="140" r="4" fill="none" stroke="#c8d8e8" stroke-width="0.8"/>
  <text x="9" y="153" font-family="monospace" font-size="6.5" fill="#c8d8e8">Mojones</text>
  <!-- Status bar -->
  <rect x="0" y="450" width="680" height="30" fill="#0d1520"/>
  <text x="60" y="469" font-family="monospace" font-size="9" fill="#27ae60">● Topology validated</text>
  <text x="220" y="469" font-family="monospace" font-size="9" fill="#e74c3c">● 2 errors pending</text>
  <text x="360" y="469" font-family="monospace" font-size="9" fill="#8a9bb0">Features: 1,240 | UTM Zona 19S | 1:25,000</text>
</svg>
